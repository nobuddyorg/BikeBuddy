name: Security

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  opengrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Run OpenGrep
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh \
            -o /tmp/opengrep-install.sh
          bash /tmp/opengrep-install.sh
          $HOME/.opengrep/cli/latest/opengrep --config p/security-audit --error

  prek:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run Prek (pre-commit)
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d
        with:
          extra-args: "--all-files"
        env:
          # opengrep runs as its own job above; skip the local hook here
          # no-commit-to-branch is not meaningful in CI
          SKIP: no-commit-to-branch,opengrep-check
