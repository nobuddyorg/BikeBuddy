name: Security

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  opengrep:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run OpenGrep
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh \
            -o /tmp/opengrep-install.sh
          bash /tmp/opengrep-install.sh
          $HOME/.opengrep/cli/latest/opengrep --config p/security-audit --error

  prek:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Run Prek (pre-commit)
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d
        with:
          extra-args: "--all-files"
        env:
          # opengrep runs as its own job above; skip the local hook here
          # no-commit-to-branch is not meaningful in CI; tofu fmt/validate run
          # in infra-check.yml (no tofu CLI here).
          SKIP: no-commit-to-branch,opengrep-check,tofu-fmt,tofu-validate
