name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_ACCESS_KEY: ${{ secrets.TF_BACKEND_ACCESS_KEY }}

jobs:
  infra:
    name: OpenTofu Apply
    runs-on: ubuntu-latest
    outputs:
      functions_url: ${{ steps.output.outputs.functions_url }}
      functions_app_name: ${{ steps.output.outputs.functions_app_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@592200bd4b9bbf4772ace78f887668b1aee8f716 # v1.0.5
        with:
          tofu_version: "~1.8"

      - name: OpenTofu Init
        run: tofu init
        working-directory: infra

      - name: OpenTofu Apply
        run: |
          tofu apply -auto-approve \
            -var="entra_tenant_subdomain=$ENTRA_SUBDOMAIN" \
            -var="entra_tenant_id=$ENTRA_TENANT_ID" \
            -var="entra_client_id=$ENTRA_CLIENT_ID"
        working-directory: infra
        env:
          ENTRA_SUBDOMAIN: ${{ vars.ENTRA_SUBDOMAIN }}
          ENTRA_TENANT_ID: ${{ vars.ENTRA_TENANT_ID }}
          ENTRA_CLIENT_ID: ${{ vars.ENTRA_CLIENT_ID }}

      - name: Capture outputs
        id: output
        run: |
          echo "functions_url=$(tofu output -raw functions_url)" >> "$GITHUB_OUTPUT"
          echo "functions_app_name=$(tofu output -raw functions_app_name)" >> "$GITHUB_OUTPUT"
        working-directory: infra

  deploy-functions:
    name: Deploy Functions (Flex, remote build)
    needs: infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # zizmor: ignore[cache-poisoning]
        with:
          node-version: "22"

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          creds: >-
            {"clientId":"${{ secrets.ARM_CLIENT_ID }}",
             "clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}",
             "subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.ARM_TENANT_ID }}"}

      # Flex Consumption deploys from its package container via the publish API.
      # functions-action's Kudu/zip path targets wwwroot and doesn't register on
      # Flex, so use Core Tools with a remote build (compiles sharp for Linux).
      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Publish (remote build)
        run: func azure functionapp publish "$FUNCTIONS_APP_NAME" --build remote
        working-directory: functions
        env:
          FUNCTIONS_APP_NAME: ${{ needs.infra.outputs.functions_app_name }}

  deploy-frontend:
    name: Deploy Frontend (GitHub Pages)
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Generate config.js
        env:
          FUNCTIONS_URL: ${{ needs.infra.outputs.functions_url }}
          ENTRA_SUBDOMAIN: ${{ vars.ENTRA_SUBDOMAIN }}
          ENTRA_CLIENT_ID: ${{ vars.ENTRA_CLIENT_ID }}
        run: |
          API_SCOPE=""
          if [ -n "$ENTRA_CLIENT_ID" ]; then API_SCOPE="api://$ENTRA_CLIENT_ID/access_as_user"; fi
          # Unquoted heredoc so the env vars below expand. Values are public
          # (client ID + subdomain are exposed in any SPA), so repo variables, not secrets.
          cat > frontend/config.js <<JSEOF
          'use strict';
          const BIKEBUDDY_CONFIG = {
            apiBaseUrl: '${FUNCTIONS_URL}',
            entraSubdomain: '${ENTRA_SUBDOMAIN}',
            entraClientId: '${ENTRA_CLIENT_ID}',
            entraApiScope: '${API_SCOPE}',
            devMode: false,
          };
          JSEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: frontend/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
