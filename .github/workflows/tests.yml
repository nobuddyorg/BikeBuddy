name: Tests

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # post coverage comment
      checks: write # publish test results check

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Run tests with coverage
        run: npm run test:ci
        working-directory: functions

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.20.0
        if: ${{ always() && !env.ACT }}
        with:
          check_name: "Unit Tests"
          files: |
            functions/reports/test-results.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        if: ${{ always() && !env.ACT }}
        with:
          filename: functions/coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          output: both
          thresholds: "60 80"

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v3.0.4
        if: ${{ github.event_name == 'pull_request' && !env.ACT }}
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.1
        if: ${{ !env.ACT }}
        with:
          files: functions/coverage/cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: nobuddyorg/BikeBuddy
          fail_ci_if_error: false # don't block CI before CODECOV_TOKEN is configured
