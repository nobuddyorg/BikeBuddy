name: Process account deletions

# Out-of-band GDPR job: deletes Entra users queued by the API on account
# deletion. The privileged Graph credential lives only here (CI secrets),
# never in the public-facing Functions app.
on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          creds: >-
            {"clientId":"${{ secrets.ARM_CLIENT_ID }}",
             "clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}",
             "subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}",
             "tenantId":"${{ secrets.ARM_TENANT_ID }}"}

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Process pending deletions
        run: ./buddy.sh maintenance delete-users
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
