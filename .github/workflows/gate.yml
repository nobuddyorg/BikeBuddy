name: CI Gate

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: "~1.8"

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Run prek
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d
        with:
          extra-args: "--all-files"
        env:
          SKIP: no-commit-to-branch

  unit:
    needs: prek
    runs-on: ubuntu-latest
    # CODECOV_TOKEN is stored as an environment secret on the "ci" environment
    environment: ci
    permissions:
      contents: read
      pull-requests: write # post coverage comment
      checks: write # publish test results check
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Run tests with coverage
        run: npm run test:ci
        working-directory: functions

      - name: Publish test results
        if: ${{ !cancelled() && !env.ACT }}
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.20.0
        with:
          check_name: "Unit Tests"
          files: functions/reports/test-results.xml
          compare_to_earlier_commit: false
          comment_mode: always
          test_changes_limit: 0

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        if: ${{ !cancelled() && !env.ACT }}
        with:
          filename: functions/coverage/cobertura-coverage.xml
          badge: true
          format: markdown
          output: both
          thresholds: "80 90"
          fail_below_min: true

      - name: Add coverage PR comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: ${{ github.event_name == 'pull_request' && !env.ACT }}
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: ${{ !env.ACT }}
        with:
          files: functions/coverage/cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: nobuddyorg/BikeBuddy
          fail_ci_if_error: true

  e2e:
    needs: unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run Playwright tests
        run: npm run test:ci
        working-directory: e2e

      - name: Publish test results
        if: ${{ !cancelled() && !env.ACT }}
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.20.0
        with:
          check_name: "E2E Tests"
          files: e2e/reports/e2e-results.xml
          compare_to_earlier_commit: false
          comment_mode: always
          test_changes_limit: 0

  e2e-fullstack:
    needs: unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    env:
      COSMOS_CONNECTION_STRING: "AccountEndpoint=http://localhost:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b5n5NVmBSuvpToAw=="
      COSMOS_DATABASE: bikebuddy
      BLOB_CONNECTION_STRING: "UseDevelopmentStorage=true"
      SKIP_AUTH: "true"
      FUNCTIONS_WORKER_RUNTIME: node
      AzureWebJobsStorage: "UseDevelopmentStorage=true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            functions/package-lock.json
            e2e/package-lock.json

      - run: npm install -g azure-functions-core-tools@4 azurite @azure/static-web-apps-cli

      - run: ./buddy.sh development start-cosmos

      - run: npm ci
        working-directory: functions

      - run: node scripts/init-cosmos.js
        working-directory: functions

      - run: ./buddy.sh development start-backend

      - run: npm ci
        working-directory: e2e

      - run: npx playwright install --with-deps chromium
        working-directory: e2e

      - run: npm run test:fullstack
        working-directory: e2e

      - if: ${{ failure() }}
        run: cat /tmp/func.log || true

      - name: Publish test results
        if: ${{ !cancelled() && !env.ACT }}
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.20.0
        with:
          check_name: "E2E Tests (full stack)"
          files: e2e/reports/e2e-fullstack-results.xml
          compare_to_earlier_commit: false
          comment_mode: always
          test_changes_limit: 0
