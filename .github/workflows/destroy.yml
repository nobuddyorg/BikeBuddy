name: Destroy

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_ACCESS_KEY: ${{ secrets.TF_BACKEND_ACCESS_KEY }}

jobs:
  destroy:
    name: OpenTofu Destroy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: "~1.8"

      # package_path must resolve for config to parse, but destroy reads from
      # state and never uploads — a placeholder zip is enough.
      - name: Create placeholder package
        run: |
          echo placeholder > placeholder.txt
          zip "$GITHUB_WORKSPACE/func.zip" placeholder.txt

      - name: OpenTofu Init
        run: tofu init
        working-directory: infrastructure

      - name: OpenTofu Destroy
        run: tofu destroy -auto-approve -var="package_path=$GITHUB_WORKSPACE/func.zip"
        working-directory: infrastructure
