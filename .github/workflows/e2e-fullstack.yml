name: E2E (full stack)

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  COSMOS_CONNECTION_STRING: "AccountEndpoint=http://localhost:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b5n5NVmBSuvpToAw=="
  COSMOS_DATABASE: bikebuddy
  BLOB_CONNECTION_STRING: "UseDevelopmentStorage=true"
  SKIP_AUTH: "true"
  FUNCTIONS_WORKER_RUNTIME: node
  AzureWebJobsStorage: "UseDevelopmentStorage=true"

jobs:
  fullstack:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write # post the test-results check/comment
      checks: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            functions/package-lock.json
            e2e/package-lock.json

      - name: Start Cosmos DB emulator
        run: ./buddy.sh development start-cosmos

      - name: Install backend toolchain
        run: npm install -g azure-functions-core-tools@4 azurite @azure/static-web-apps-cli

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Initialize Cosmos database + containers
        run: node scripts/init-cosmos.js
        working-directory: functions

      - name: Start Azurite + Functions host
        run: ./buddy.sh development start-backend

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run full-stack Playwright tests
        run: npm run test:fullstack
        working-directory: e2e

      - name: Show Functions log on failure
        if: ${{ failure() }}
        run: cat /tmp/func.log || true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.20.0
        if: ${{ always() && !env.ACT }}
        with:
          check_name: "E2E Tests (full stack)"
          files: |
            e2e/reports/e2e-fullstack-results.xml
