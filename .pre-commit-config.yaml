repos:
  # Standard file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # Spell checking
  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
        # Vendored third-party minified bundle — short variable names trip the spell checker.
        exclude: ^frontend/src/vendor/

  # zizmor: detects security vulnerabilities in GitHub Actions workflows
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
        args: ["--fix"]

  # ESLint (functions/)
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: bash -c 'cd functions && npm run lint'
        language: system
        pass_filenames: false
        files: ^functions/(src|test)/
        stages: [pre-commit]

  # Prettier check (functions/) — auto-fix with: npm run format
  - repo: local
    hooks:
      - id: prettier
        name: Prettier
        entry: bash -c "cd functions && npx prettier --check 'src/**/*.js' 'test/**/*.js'"
        language: system
        pass_filenames: false
        files: ^functions/(src|test)/
        stages: [pre-commit]

  # Prettier check (e2e/ TypeScript) — reuses functions' prettier; fix with: cd e2e && npm run format
  - repo: local
    hooks:
      - id: prettier-e2e
        name: Prettier (e2e)
        entry: bash -c "cd functions && npx prettier --check '../e2e/**/*.ts'"
        language: system
        pass_filenames: false
        files: ^e2e/.*\.ts$
        stages: [pre-commit]

  # ESLint (frontend/) — browser + ESM; reuses functions' eslint install. Runs
  # from the repo root so the files are inside ESLint's base path.
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (frontend)
        entry: functions/node_modules/.bin/eslint --config functions/eslint.frontend.config.js frontend/src frontend/test
        language: system
        pass_filenames: false
        files: ^frontend/(src|test)/.*\.js$
        exclude: ^frontend/src/vendor/
        stages: [pre-commit]

  # Prettier check (frontend/) — fix with: cd functions && npx prettier --write '../frontend/...'
  - repo: local
    hooks:
      - id: prettier-frontend
        name: Prettier (frontend)
        # --config: frontend/ has no .prettierrc, so point at functions' config
        # explicitly (Prettier resolves config from each file's directory).
        entry: bash -c "cd functions && npx prettier --check --config .prettierrc.json '../frontend/*.js' '../frontend/src/*.{js,css,html}' '../frontend/src/lib/**/*.js' '../frontend/test/**/*.js'"
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(js|css|html)$
        exclude: ^frontend/src/vendor/
        stages: [pre-commit]

  # ShellCheck for shell scripts (auto-installs in its own env).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # Prettier check (markdown) — the formatter for docs; fix with prettier --write.
  - repo: local
    hooks:
      - id: prettier-md
        name: Prettier (markdown)
        entry: functions/node_modules/.bin/prettier --check --config functions/.prettierrc.json
        language: system
        files: \.md$
        exclude: (^|/)node_modules/

  # markdownlint — linter for docs (config: .markdownlint-cli2.jsonc).
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  # editorconfig-checker — enforce .editorconfig across the repo.
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        alias: ec

  # OpenTofu fmt + validate (needs the tofu CLI; CI installs it for the prek job).
  - repo: local
    hooks:
      - id: tofu-fmt
        name: OpenTofu fmt
        entry: bash -c 'cd infrastructure && tofu fmt -check -recursive'
        language: system
        pass_filenames: false
        files: ^infrastructure/.*\.tf$
        stages: [pre-commit]
      - id: tofu-validate
        name: OpenTofu validate
        entry: bash -c 'cd infrastructure && tofu init -backend=false -input=false >/dev/null && tofu validate'
        language: system
        pass_filenames: false
        files: ^infrastructure/.*\.tf$
        stages: [pre-commit]

  # OpenGrep SAST — install auto-bootstrapped on first run (local and CI).
  - repo: local
    hooks:
      - id: opengrep-check
        name: OpenGrep
        entry: >-
          bash -lc '
          if ! command -v opengrep &>/dev/null &&
             [ ! -f "$HOME/.opengrep/cli/latest/opengrep" ]; then
            curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh \
              -o /tmp/opengrep-install.sh && bash /tmp/opengrep-install.sh; fi &&
          ${HOME}/.opengrep/cli/latest/opengrep \
            --config p/security-audit --error --autofix'
        language: system
        pass_filenames: false
        stages: [pre-commit]
